<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <br>

    <br>

    <br>

    <br>

       <br>

       <br>

       <input type="checkbox" name="checkbox" id="checkbox">
    </fieldset>
    <br>
    <br>
    <legend>Highest education</legend>
    <br>
    <select name="education" id="education">
        <option value="education">High School</option>
        <option value="education"> Secondary school</option>
        <option value="education">Graduation</option>
    </select>
    <br>
    <br>
    <legend>Avaibality:</legend>

    <br>
    <br>

    <input type="radio" name="radio" id="radio">
    <br>
    <br>

    <button>submit</button>

</html>
